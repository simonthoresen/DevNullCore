name: Build & Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: make build

      - name: Generate bundle manifest
        shell: bash
        run: go run ./cmd/gen-manifest dist/ > dist/.bundle-manifest.json

      - name: Package dist folder
        shell: bash
        run: |
          cd dist
          7z a -tzip ../dev-null.zip . \
            -xr!logs \
            -xr!state \
            -xr!*_ed25519 \
            -xr!*_ed25519.pub \
            -xr!.bundle-version

      - name: Get short SHA
        id: sha
        shell: bash
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Update rolling latest release
        if: github.ref == 'refs/heads/main'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete existing latest release+tag if present
          gh release delete latest --yes 2>/dev/null || true
          git tag -d latest 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true

          # Create new release with all assets
          git tag latest
          git push origin latest
          gh release create latest \
            dev-null.zip \
            dist/dev-null-server.exe \
            dist/dev-null-client.exe \
            dist/pinggy-helper.exe \
            --title "Latest Build (${{ steps.sha.outputs.short }})" \
            --notes "Auto-built from main at ${{ github.sha }}.

          **Fresh install:** save and run [install.ps1](https://github.com/simonthoresen/dev-null/raw/main/install.ps1).
          **Existing install:** \`start-server.ps1\` / \`start-client.ps1\` auto-update binaries on each launch." \
            --latest

      - name: Create versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            dev-null.zip \
            dist/dev-null-server.exe \
            dist/dev-null-client.exe \
            dist/pinggy-helper.exe \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes
