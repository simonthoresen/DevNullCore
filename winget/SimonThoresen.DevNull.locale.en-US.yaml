ShortDescription: Terminal-based multiplayer game server over SSH
Description: >-
  A framework for hosting terminal-based multiplayer games over SSH.
  Only the server operator needs to install anything — players connect
  with a plain ssh command, no client install required. Games are written
  in JavaScript and loaded at runtime.
